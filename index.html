<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Soroban Tool EN ZH BM</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      background: #f2f2f2;
      font-family: Arial, Helvetica, sans-serif;
      overflow: auto;
    }

    .tool {
      width: min(96vw, 760px);
      min-height: 100dvh;
      margin: 0 auto;
      padding: 12px 8px 90px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .top-panel {
      position: relative;
      width: 100%;
      min-height: 108px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 0 10px;
    }

    .display {
      width: 100%;
      padding: 0 96px;
      color: #222;
      line-height: 1.1;
    }

    .number-line {
      font-size: clamp(40px, 8vw, 68px);
      font-weight: 800;
      line-height: 1;
      letter-spacing: 3px;
    }

    .word-line {
      margin-top: 7px;
      min-height: 28px;
      font-size: clamp(18px, 2.8vw, 25px);
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: .3px;
      overflow-wrap: anywhere;
    }

    .word-line.hidden {
      display: none;
    }

    .lang-switch {
      position: absolute;
      right: 0;
      top: 8px;
      display: flex;
      gap: 5px;
      z-index: 100;
      background: #ffffff;
      padding: 5px;
      border-radius: 13px;
      box-shadow: 0 2px 8px rgba(0,0,0,.10);
    }

    .lang-btn {
      min-width: 42px;
      height: 34px;
      border-radius: 10px;
      border: 2px solid #222;
      background: #fff;
      color: #111;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
    }

    .lang-btn.active {
      background: #222;
      color: #fff;
    }

    .speak-btn {
      min-width: 42px;
      height: 34px;
      border-radius: 10px;
      border: 2px solid #222;
      background: #fff;
      color: #111;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      padding: 5px 8px;
    }

    .speak-btn:active {
      transform: scale(.98);
    }


    .abacus-wrap {
      position: relative;
      width: min(100%, 700px);
      aspect-ratio: 4 / 3;
      margin: 0 auto;
      user-select: none;
      touch-action: none;
    }

    .frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      z-index: 1;
    }

    .rod-label {
      position: absolute;
      bottom: 4.8%;
      transform: translateX(-50%);
      z-index: 8;

      /* Smaller and consistent for EN labels: thousand / hundred / ten / one */
      font-size: clamp(10px, 1.6vw, 15px);
      font-weight: 900;
      color: #222;
      background: rgba(255, 255, 255, .78);
      border-radius: 8px;
      padding: 2px 4px;
      line-height: 1;
      pointer-events: none;
      white-space: nowrap;
    }

    .rod-label.hidden {
      display: none;
    }

    .bead {
      position: absolute;
      width: 10.5%;
      aspect-ratio: 1 / 1;
      transform: translate(-50%, -50%);
      cursor: grab;
      touch-action: none;
      user-select: none;
      z-index: 4;
    }

    .bead:active {
      cursor: grabbing;
      z-index: 20;
    }

    .controls {
      position: fixed;
      right: 14px;
      bottom: 14px;
      z-index: 100;
    }

    button {
      font-size: 18px;
      font-weight: 700;
      padding: 9px 18px;
      border-radius: 12px;
      border: 2px solid #333;
      background: #ffffff;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }

    @media (max-width: 640px) {
      .tool {
        width: 100%;
        padding: 10px 8px 90px;
      }

      .top-panel {
        min-height: 128px;
        margin-bottom: 4px;
        flex-direction: column;
        justify-content: center;
        gap: 6px;
      }

      .display {
        padding: 0 6px;
      }

      .number-line {
        font-size: clamp(38px, 12vw, 58px);
      }

      .word-line {
        font-size: clamp(17px, 5vw, 22px);
        min-height: 24px;
      }

      /*
        Mobile fix:
        Put EN / ZH / BM above the number instead of floating over it.
      */
      .lang-switch {
        position: static;
        right: auto;
        top: auto;
        order: -1;
        margin: 0 auto;
        gap: 4px;
        padding: 4px;
      }

      .lang-btn {
        min-width: 46px;
        height: 31px;
        font-size: 13px;
        padding: 5px 10px;
      }

      .speak-btn {
        min-width: 38px;
        height: 31px;
        font-size: 14px;
        padding: 5px 8px;
      }

      .abacus-wrap {
        width: min(92vw, 520px);
      }

      .rod-label {
        bottom: 4.4%;

        /* Smaller and consistent on mobile */
        font-size: clamp(9px, 2.6vw, 12px);
        padding: 1px 3px;
        line-height: 1;
      }
    }
  </style>
</head>
<body>
  <main class="tool">
    <section class="top-panel">
      <div class="lang-switch" aria-label="Language switch">
        <button class="lang-btn active" type="button" data-lang="en">EN</button>
        <button class="lang-btn" type="button" data-lang="zh">ZH</button>
        <button class="lang-btn" type="button" data-lang="bm">BM</button>
        <button class="speak-btn" id="speakBtn" type="button" aria-label="Speak">🔊</button>
      </div>

      <div class="display">
        <div class="number-line" id="numberDisplay">0</div>
        <div class="word-line hidden" id="wordDisplay"></div>
      </div>
    </section>

    <div class="abacus-wrap" id="abacus">
      <img class="frame" src="assets/frame.png" alt="Soroban frame" />

      <div class="rod-label hidden" data-label-col="0"></div>
      <div class="rod-label hidden" data-label-col="1"></div>
      <div class="rod-label hidden" data-label-col="2"></div>
      <div class="rod-label hidden" data-label-col="3"></div>
    </div>
  </main>

  <div class="controls">
    <button id="resetBtn">Reset</button>
  </div>

  <script>
    const abacus = document.getElementById("abacus");
    const numberDisplay = document.getElementById("numberDisplay");
    const wordDisplay = document.getElementById("wordDisplay");
    const resetBtn = document.getElementById("resetBtn");
    const speakBtn = document.getElementById("speakBtn");
    const langButtons = document.querySelectorAll(".lang-btn");
    const rodLabels = document.querySelectorAll(".rod-label");

    // Rod centers tuned to the current 2D frame
    const columns = [
      { place: 1000, x: 29.15, upper: false, lower: 0 },
      { place: 100,  x: 43.10, upper: false, lower: 0 },
      { place: 10,   x: 56.95, upper: false, lower: 0 },
      { place: 1,    x: 70.75, upper: false, lower: 0 }
    ];

    const languageData = {
      en: {
        labels: ["thousand", "hundred", "ten", "one"],
        showLabels: true,
        words: numberToEnglish,
        speechLang: "en-US"
      },
      zh: {
        labels: ["千", "百", "十", "个"],
        showLabels: true,
        words: numberToChinese,
        speechLang: "zh-CN"
      },
      bm: {
        labels: ["ribu", "ratus", "puluh", "sa"],
        showLabels: true,
        words: numberToMalay,
        speechLang: "ms-MY"
      }
    };

    let currentLang = "en";

    /*
      Label position fine tuning only.
      This will NOT move the abacus beads.

      Order:
      [thousand, hundred, ten, one]

      Positive number = move right
      Negative number = move left

      Your current mobile issue:
      hundred is moved slightly right by 1.2%.
    */
    const labelOffsetPc = [0, 0, 0, 0];
    const labelOffsetMobile = [0, 1.2, 0, 0];

    function updateLabelPositions() {
      const isMobile = window.matchMedia("(max-width: 640px)").matches;

      rodLabels.forEach(label => {
        const colIndex = Number(label.dataset.labelCol);
        const offset = isMobile ? labelOffsetMobile[colIndex] : labelOffsetPc[colIndex];
        label.style.left = (columns[colIndex].x + offset) + "%";
      });
    }

    updateLabelPositions();
    window.addEventListener("resize", updateLabelPositions);

    langButtons.forEach(button => {
      button.addEventListener("click", () => {
        setLanguage(button.dataset.lang);
      });
    });

    function setLanguage(lang) {
      currentLang = lang;
      stopMalayAudio();

      langButtons.forEach(button => {
        button.classList.toggle("active", button.dataset.lang === lang);
      });

      const data = languageData[lang];

      rodLabels.forEach((label, index) => {
        label.textContent = data.labels[index];
        label.classList.toggle("hidden", !data.showLabels);
      });

      wordDisplay.classList.remove("hidden");
      updateNumber();
    }

    // Upper bead:
    // - higher at rest
    // - active position lowered so it touches the middle beam from above
    const upperY = {
      inactive: 14.8,
      active: 28.5
    };

    // Lower beads:
    // - active positions rise up close to the middle beam
    // - inactive positions sit lower but still close together
    // - bottom bead stays inside the frame
    const lowerActiveY = [42.5, 50.3, 58.1, 65.9];
    const lowerInactiveY = [58.6, 66.4, 74.2, 82.0];

    const beads = [];
    let dragging = null;

    function createBeads() {
      abacus.querySelectorAll(".bead").forEach(b => b.remove());
      beads.length = 0;

      columns.forEach((col, colIndex) => {
        createBead({ colIndex, type: "upper", lowerIndex: null });
        for (let i = 0; i < 4; i++) {
          createBead({ colIndex, type: "lower", lowerIndex: i });
        }
      });

      syncBeadPositions();
      updateNumber();
    }

    function createBead(data) {
      const img = document.createElement("img");
      img.src = "assets/bead.png";
      img.className = "bead";
      img.draggable = false;
      img.dataset.col = data.colIndex;
      img.dataset.type = data.type;
      img.dataset.lowerIndex = data.lowerIndex ?? "";

      img.addEventListener("pointerdown", onPointerDown);
      beads.push(img);
      abacus.appendChild(img);
    }

    function syncBeadPositions() {
      beads.forEach(bead => {
        const colIndex = Number(bead.dataset.col);
        const type = bead.dataset.type;
        const col = columns[colIndex];

        bead.style.left = col.x + "%";

        if (type === "upper") {
          bead.style.top = (col.upper ? upperY.active : upperY.inactive) + "%";
        } else {
          const i = Number(bead.dataset.lowerIndex);
          bead.style.top = (i < col.lower ? lowerActiveY[i] : lowerInactiveY[i]) + "%";
        }
      });
    }

    function onPointerDown(e) {
      const bead = e.currentTarget;
      bead.setPointerCapture(e.pointerId);

      dragging = {
        bead,
        rect: abacus.getBoundingClientRect()
      };

      bead.addEventListener("pointermove", onPointerMove);
      bead.addEventListener("pointerup", onPointerUp);
      bead.addEventListener("pointercancel", onPointerUp);
    }

    function onPointerMove(e) {
      if (!dragging) return;

      const bead = dragging.bead;
      const rect = dragging.rect;
      const colIndex = Number(bead.dataset.col);
      const type = bead.dataset.type;
      const col = columns[colIndex];
      const yPercent = ((e.clientY - rect.top) / rect.height) * 100;

      if (type === "upper") {
        const threshold = (upperY.inactive + upperY.active) / 2;
        col.upper = yPercent > threshold;
      } else {
        const i = Number(bead.dataset.lowerIndex);
        const threshold = (lowerActiveY[i] + lowerInactiveY[i]) / 2;

        // Dragging the 2nd / 3rd / 4th lower bead moves the beads above together
        if (yPercent < threshold) {
          col.lower = i + 1;
        } else {
          col.lower = i;
        }
      }

      syncBeadPositions();
      updateNumber();
    }

    function onPointerUp() {
      if (!dragging) return;

      const bead = dragging.bead;
      bead.removeEventListener("pointermove", onPointerMove);
      bead.removeEventListener("pointerup", onPointerUp);
      bead.removeEventListener("pointercancel", onPointerUp);
      dragging = null;

      syncBeadPositions();
      updateNumber();
    }

    function getTotal() {
      let total = 0;

      columns.forEach(col => {
        const digit = (col.upper ? 5 : 0) + col.lower;
        total += digit * col.place;
      });

      return total;
    }

    function updateNumber() {
      const total = getTotal();
      numberDisplay.textContent = total.toString();
      wordDisplay.textContent = languageData[currentLang].words(total);
    }

    function resetAbacus() {
      stopMalayAudio();
      columns.forEach(col => {
        col.upper = false;
        col.lower = 0;
      });

      syncBeadPositions();
      updateNumber();
    }

    function numberToEnglish(n) {
      const ones = ["zero", "one", "two", "three", "four", "five", "six", "seven", "eight", "nine",
                    "ten", "eleven", "twelve", "thirteen", "fourteen", "fifteen", "sixteen",
                    "seventeen", "eighteen", "nineteen"];
      const tens = ["", "", "twenty", "thirty", "forty", "fifty", "sixty", "seventy", "eighty", "ninety"];

      function under100(num) {
        if (num < 20) return ones[num];
        const t = Math.floor(num / 10);
        const o = num % 10;
        return tens[t] + (o ? " " + ones[o] : "");
      }

      function under1000(num) {
        if (num < 100) return under100(num);
        const h = Math.floor(num / 100);
        const rest = num % 100;
        return ones[h] + " hundred" + (rest ? " " + under100(rest) : "");
      }

      if (n === 0) return "zero";
      if (n < 1000) return under1000(n);

      const th = Math.floor(n / 1000);
      const rest = n % 1000;
      return ones[th] + " thousand" + (rest ? " " + under1000(rest) : "");
    }

    function numberToMalay(n) {
      if (n === 0) return "sifar";

      const ones = ["sifar", "satu", "dua", "tiga", "empat", "lima", "enam", "tujuh", "lapan", "sembilan"];

      function under100(num) {
        if (num < 10) return ones[num];
        if (num === 10) return "sepuluh";
        if (num === 11) return "sebelas";
        if (num < 20) return ones[num - 10] + " belas";

        const puluh = Math.floor(num / 10);
        const sa = num % 10;
        return ones[puluh] + " puluh" + (sa ? " " + ones[sa] : "");
      }

      function under1000(num) {
        if (num < 100) return under100(num);

        const ratus = Math.floor(num / 100);
        const baki = num % 100;

        // Place-value teaching style:
        // 100 = satu ratus, not seratus
        let text = ones[ratus] + " ratus";
        if (baki > 0) text += " " + under100(baki);
        return text;
      }

      function underMillion(num) {
        if (num < 1000) return under1000(num);

        const ribu = Math.floor(num / 1000);
        const baki = num % 1000;

        // Place-value teaching style:
        // 1000 = satu ribu, not seribu
        let text = under1000(ribu) + " ribu";
        if (baki > 0) text += " " + under1000(baki);
        return text;
      }

      if (n < 1000000) return underMillion(n);

      const juta = Math.floor(n / 1000000);
      const baki = n % 1000000;

      // Place-value teaching style:
      // 1000000 = satu juta, not sejuta
      let text = underMillion(juta) + " juta";
      if (baki > 0) text += " " + underMillion(baki);
      return text;
    }

    function numberToChinese(n) {
      const digit = ["零", "一", "二", "三", "四", "五", "六", "七", "八", "九"];

      if (n === 0) return "零";

      const thousands = Math.floor(n / 1000);
      const hundreds = Math.floor((n % 1000) / 100);
      const tens = Math.floor((n % 100) / 10);
      const ones = n % 10;

      let text = "";

      if (thousands > 0) {
        text += digit[thousands] + "千";
      }

      if (hundreds > 0) {
        text += digit[hundreds] + "百";
      } else if (thousands > 0 && (tens > 0 || ones > 0)) {
        text += "零";
      }

      if (tens > 0) {
        if (tens === 1 && thousands === 0 && hundreds === 0) {
          text += "十";
        } else {
          text += digit[tens] + "十";
        }
      } else if ((thousands > 0 || hundreds > 0) && ones > 0) {
        if (!text.endsWith("零")) text += "零";
      }

      if (ones > 0) {
        text += digit[ones];
      }

      return text;
    }

    resetBtn.addEventListener("click", resetAbacus);

    // Preload common BM audio files so phone playback feels faster after the page opens.
    const bmCommonAudioWords = [
      "sifar", "satu", "dua", "tiga", "empat", "lima", "enam", "tujuh", "lapan", "sembilan",
      "sepuluh", "sebelas", "belas", "puluh", "ratus", "ribu", "juta"
    ];
    const bmAudioUrlCache = new Map();

    function getBmAudioCandidatePaths(name) {
      const forms = makeMalayFileNameVariants(name, true);
      const extensions = [".MP3", ".mp3", ".Mp3"];
      const paths = [];

      for (const form of forms) {
        for (const ext of extensions) {
          paths.push(`assets/audio/bm/${form}${ext}`);
        }
      }

      return paths;
    }

    function preloadMalayAudio() {
      bmCommonAudioWords.forEach(word => {
        getBmAudioCandidatePaths(word).forEach(src => {
          const audio = new Audio();
          audio.preload = "auto";
          audio.src = src;
          audio.load();
        });
      });
    }

    // Android / iPhone usually allows better loading after first touch.
    window.addEventListener("load", () => {
      setTimeout(preloadMalayAudio, 300);
    }, { once: true });

    document.addEventListener("pointerdown", () => {
      preloadMalayAudio();
    }, { once: true });

    speakBtn.addEventListener("click", speakCurrentAnswer);

    async function speakCurrentAnswer() {
      const total = getTotal();
      const text = languageData[currentLang].words(total);
      if (!text) return;

      // BM uses your own Malaysia Malay MP3 files for accurate pronunciation.
      if (currentLang === "bm") {
        window.speechSynthesis?.cancel();
        await playMalayMp3Sequence(text);
        return;
      }

      // EN and ZH still use browser TTS.
      if (!("speechSynthesis" in window)) return;

      window.speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = languageData[currentLang].speechLang;
      utterance.voice = getPreferredVoice(currentLang);

      if (currentLang === "zh") {
        utterance.rate = 0.85;
        utterance.pitch = 1.05;
      } else {
        utterance.rate = 0.9;
        utterance.pitch = 1.15;
      }

      window.speechSynthesis.speak(utterance);
    }

    function stopMalayAudio() {
      bmAudioToken++;
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
      }
      window.speechSynthesis?.cancel();
    }

    let currentAudio = null;
    let bmAudioToken = 0;

    async function playMalayMp3Sequence(text) {
      bmAudioToken++;
      const token = bmAudioToken;

      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
      }

      const chunks = makeMalayAudioChunks(text);

      for (const chunk of chunks) {
        if (token !== bmAudioToken) return;
        await playMalayChunkMp3(chunk, token);
        await wait(0);
      }
    }

    function makeMalayAudioChunks(text) {
      const rawWords = text.trim().toLowerCase().split(/\s+/).filter(Boolean);
      const chunks = [];

      for (const word of rawWords) {
        // Keep compatibility if old wording ever appears.
        if (word === "seratus") {
          chunks.push("satu", "ratus");
          continue;
        }
        if (word === "seribu") {
          chunks.push("satu", "ribu");
          continue;
        }
        if (word === "sejuta") {
          chunks.push("satu", "juta");
          continue;
        }

        // For 12-19, play as separate chunks:
        // dua + belas, tiga + belas, etc.
        // This is faster than trying many phrase filenames first.
        chunks.push(word);
      }

      return chunks;
    }

    async function playMalayChunkMp3(chunk, token) {
      // First try a phrase file for 12-19, e.g.:
      // dua belas.MP3 / dua_belas.MP3 / dua-belas.MP3 / duabelas.MP3
      const phraseOk = await playMalayFileMp3(chunk, token, true);
      if (phraseOk) return true;

      // If phrase file is missing, fall back to separate word files:
      // dua.MP3 + belas.MP3
      if (chunk.includes(" ")) {
        let anyOk = false;
        const parts = chunk.split(/\s+/).filter(Boolean);
        for (const part of parts) {
          if (token !== bmAudioToken) return false;
          const ok = await playMalayFileMp3(part, token, false);
          anyOk = anyOk || ok;
          await wait(0);
        }
        return anyOk;
      }

      return false;
    }

    async function playMalayFileMp3(name, token, allowPhraseVariants) {
      const forms = makeMalayFileNameVariants(name, allowPhraseVariants);
      const extensions = [".MP3", ".mp3", ".Mp3"];

      for (const form of forms) {
        for (const ext of extensions) {
          const src = `assets/audio/bm/${form}${ext}`;

          // If this word already worked before, try that exact URL first next time.
          if (bmAudioUrlCache.get(name) === src) {
            const ok = await playOneMp3(src, token);
            if (ok) return true;
          }

          const ok = await playOneMp3(src, token);
          if (ok) {
            bmAudioUrlCache.set(name, src);
            return true;
          }
        }
      }

      console.warn("Missing BM audio file:", name);
      return false;
    }

    function makeMalayFileNameVariants(name, allowPhraseVariants) {
      const clean = name.trim().toLowerCase().replace(/\s+/g, " ");
      const variants = [clean];

      if (allowPhraseVariants && clean.includes(" ")) {
        variants.push(
          clean.replace(/\s+/g, "_"),
          clean.replace(/\s+/g, "-"),
          clean.replace(/\s+/g, "")
        );
      }

      return [...new Set(variants)];
    }

    function playOneMp3(src, token) {
      return new Promise(resolve => {
        if (token !== bmAudioToken) return resolve(false);

        const audio = new Audio(src);
        currentAudio = audio;

        // Faster BM MP3 playback for mobile.
        audio.playbackRate = 1.18;

        audio.onended = () => resolve(true);
        audio.onerror = () => resolve(false);

        audio.play().catch(err => {
          console.warn("Audio play blocked or failed:", err);
          resolve(false);
        });
      });
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function getPreferredVoice(lang) {
      const voices = window.speechSynthesis.getVoices();

      const femaleKeywords = [
        "female", "woman", "girl",
        "zira", "aria", "jenny", "samantha", "victoria", "susan",
        "karen", "moira", "tessa", "siti", "yasmin", "ayu"
      ];

      function soundsFemale(voice) {
        const name = voice.name.toLowerCase();
        return femaleKeywords.some(keyword => name.includes(keyword));
      }

      function byLang(code) {
        return voices.filter(v => v.lang.toLowerCase() === code.toLowerCase());
      }

      function byLangPrefix(prefix) {
        return voices.filter(v => v.lang.toLowerCase().startsWith(prefix.toLowerCase()));
      }

      function chooseFemale(list) {
        return list.find(soundsFemale) || list[0] || null;
      }

      if (lang === "bm") {
        // Best: exact Malaysia Malay voice
        let list = byLang("ms-MY");
        let voice = chooseFemale(list);
        if (voice) return voice;

        // Next: any Malay voice
        list = byLangPrefix("ms");
        voice = chooseFemale(list);
        if (voice) return voice;

        // Some systems label Malay strangely. Try name search.
        list = voices.filter(v => {
          const name = v.name.toLowerCase();
          const code = v.lang.toLowerCase();
          return name.includes("malay") || name.includes("malaysia") || code.includes("ms");
        });
        voice = chooseFemale(list);
        if (voice) return voice;
      }

      if (lang === "en") {
        // Prefer common female English voices
        let list = byLang("en-US").concat(byLang("en-GB")).concat(byLangPrefix("en"));
        let voice = chooseFemale(list);
        if (voice) return voice;
      }

      if (lang === "zh") {
        let list = byLang("zh-CN")
          .concat(byLang("zh-TW"))
          .concat(byLang("zh-HK"))
          .concat(byLangPrefix("zh"));
        return list[0] || null;
      }

      return null;
    }

    // Some browsers load voices after page load.
    if ("speechSynthesis" in window) {
      window.speechSynthesis.onvoiceschanged = () => {
        window.speechSynthesis.getVoices();
      };
    }

    createBeads();
    setLanguage("en");
      // BM audio tuning: word gap = 0ms, playbackRate = 1.18, teen fallback enabled
      // BM mobile preload enabled: common MP3 files preload after page open / first touch.
      // Audio load optimized: no phrase-file 404 attempts for 12-19; .MP3 tried first; preload/cache kept.
  </script>
</body>
</html>
